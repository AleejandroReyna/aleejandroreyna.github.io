name: PR Validation (Dry-run)

on:
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: aleejandroreyna
  REGION: us-central1
  SERVICE_NAME: alejandro-reyna-site
  REPOSITORY: site-images

jobs:
  terraform-plan:
    name: Terraform Plan (Dry-run)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform

  build-test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Container
        run: |-
          docker build -t test-image .
